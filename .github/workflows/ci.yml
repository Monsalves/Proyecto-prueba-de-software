name: Bus de Objetos CI (Etapa 2)

on: [push, pull_request]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-html

    - name: Ejecutar Pruebas Unitarias Nativas y Generar Reporte
      run: |
        pytest tests/unit --html=reporte_tests.html --self-contained-html

    - name: Subir Reporte HTML
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: reporte-tests-html
        path: reporte_tests.html
